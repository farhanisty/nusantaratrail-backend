steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'asia-southeast2-docker.pkg.dev/nusantaratrail123/nusantara/backend:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'asia-southeast2-docker.pkg.dev/nusantaratrail123/nusantara/backend:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nusantara-backend
      - '--image'
      - 'asia-southeast2-docker.pkg.dev/nusantaratrail123/nusantara/backend:latest'
      - '--region'
      - 'asia-southeast2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'asia-southeast2-docker.pkg.dev/nusantaratrail123/nusantara/backend:latest'